<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard | DesignTech VLSI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#020617;
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:#0f172a;
}

nav h2{
margin:0;
color:#38bdf8;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

.container{
padding:60px;
}

#welcome{
font-size:28px;
margin-bottom:40px;
color:#38bdf8;
}

.courses{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.card{
background:#1e293b;
padding:30px;
border-radius:12px;
text-align:center;
position:relative;
}

.lock{
position:absolute;
top:10px;
right:10px;
background:red;
padding:5px 10px;
border-radius:6px;
font-size:12px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
background:#38bdf8;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#22c1f0;
}

footer{
text-align:center;
padding:30px;
background:#0f172a;
margin-top:60px;
}

</style>

</head>

<body>

<nav>

<h2>DesignTech VLSI</h2>

<div>
<a href="index.html">Home</a>
<a href="#" id="logout">Logout</a>
</div>

</nav>

<div class="container">

<h1 id="welcome">Welcome</h1>

<div class="courses">

<!-- COURSE 1 -->

<div class="card">

<div class="lock" id="lock-course1">LOCKED</div>

<h3>Physical Design Layout</h3>

<button onclick="buyCourse('course1',1999)">Unlock Course</button>

<button id="open-course1" onclick="openCourse('course1')" style="display:none">
Open Course
</button>

</div>

<!-- COURSE 2 -->

<div class="card">

<div class="lock" id="lock-course2">LOCKED</div>

<h3>VLSI Lecture Series</h3>

<button onclick="buyCourse('course2',1999)">Unlock Course</button>

<button id="open-course2" onclick="openCourse('course2')" style="display:none">
Open Course
</button>

</div>

<!-- COURSE 3 -->

<div class="card">

<div class="lock" id="lock-course3">LOCKED</div>

<h3>Cadence Analog Basics</h3>

<button onclick="buyCourse('course3',1)">Unlock Course ₹1</button>

<button id="open-course3" onclick="openCourse('course3')" style="display:none">
Open Course
</button>

</div>

<!-- COURSE 4 -->

<div class="card">

<div class="lock" id="lock-course4">LOCKED</div>

<h3>Signals and Systems</h3>

<button onclick="buyCourse('course4',299)">Unlock Course</button>

<button id="open-course4" onclick="openCourse('course4')" style="display:none">
Open Course
</button>

</div>

<!-- COURSE 5 -->

<div class="card">

<div class="lock" id="lock-course5">LOCKED</div>

<h3>Network Theory</h3>

<button onclick="buyCourse('course5',299)">Unlock Course</button>

<button id="open-course5" onclick="openCourse('course5')" style="display:none">
Open Course
</button>

</div>

</div>

</div>

<footer>

© 2026 DesignTech VLSI

</footer>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAuth,onAuthStateChanged,signOut }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore,doc,setDoc,getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyA9ses0NXK4OI9JcEH3ym8nDS-kvBlBT_8",
authDomain: "designtechvlsi.firebaseapp.com",
projectId: "designtechvlsi",
storageBucket: "designtechvlsi.firebasestorage.app",
messagingSenderId: "268545364402",
appId: "1:268545364402:web:57a3d1d3fb8535998754ab"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

let currentUser;

/* LOGIN CHECK */

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href="login.html";

}else{

currentUser=user;

const name=user.displayName || "Student";

document.getElementById("welcome").innerText="Welcome, "+name;

checkAccess("course1");
checkAccess("course2");
checkAccess("course3");
checkAccess("course4");
checkAccess("course5");

}

});

/* LOGOUT */

document.getElementById("logout").addEventListener("click",()=>{

signOut(auth).then(()=>{

window.location.href="index.html";

});

});

/* PAYMENT */

window.buyCourse=function(course,price){

var options = {

key:"rzp_live_SONJ2W1OZ1qVLZ",

amount:price*100,

currency:"INR",

name:"DesignTech VLSI",

description:course+" access",

handler:async function(){

await setDoc(doc(db,"users",currentUser.uid,"courses",course),{

unlocked:true,
time:Date.now()

});

alert("Course unlocked");

location.reload();

}

};

var rzp=new Razorpay(options);

rzp.open();

}

/* CHECK ACCESS */

async function checkAccess(course){

const ref=doc(db,"users",currentUser.uid,"courses",course);

const snap=await getDoc(ref);

if(snap.exists()){

document.getElementById("lock-"+course).innerText="UNLOCKED";

document.getElementById("open-"+course).style.display="block";

}

}

/* OPEN COURSE */

window.openCourse=function(course){

if(course=="course1") window.location.href="course1player.html";

if(course=="course2") window.location.href="course2player.html";

if(course=="course3") window.location.href="course3player.html";

if(course=="course4") window.location.href="course4player.html";

if(course=="course5") window.location.href="course5player.html";

}

</script>

</body>
</html>
