<!DOCTYPE html>
<html>

<head>

<title>Student Dashboard | DesignTech VLSI</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#020617;
color:white;
padding:40px;
margin:0;
}

.card{
background:#1e293b;
padding:30px;
margin:20px 0;
border-radius:10px;
}

.course{
margin:10px 0;
padding:12px;
background:#0f172a;
border-radius:6px;
}

a{
color:#38bdf8;
text-decoration:none;
}

.lock{
color:#f87171;
}

button{
padding:10px 20px;
background:#ef4444;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#dc2626;
}

</style>

</head>

<body>

<h1>Student Dashboard</h1>

<div class="card">

<h3>My Courses</h3>

<div id="course1" class="course lock">🔒 Physical Design Layout</div>
<div id="course2" class="course lock">🔒 VLSI Lecture Series</div>
<div id="course3" class="course lock">🔒 Cadence Analog Basics</div>
<div id="course4" class="course lock">🔒 Signal and Systems</div>
<div id="course5" class="course lock">🔒 Network Theory</div>
<div id="mentorship" class="course lock">🔒 1-to-1 Mentorship</div>

</div>

<button onclick="logout()">Logout</button>


<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {

apiKey: "AIzaSyA9ses0NXK4OI9JcEH3ym8nDS-kvBlBT_8",
authDomain: "designtechvlsi.firebaseapp.com",
projectId: "designtechvlsi",
storageBucket: "designtechvlsi.firebasestorage.app",
messagingSenderId: "268545364402",
appId: "1:268545364402:web:57a3d1d3fb8535998754ab",
measurementId: "G-F5KGZK2JDK"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();


firebase.auth().onAuthStateChanged(function(user){

if(!user){

window.location="login.html"

}

else{

db.collection("users").doc(user.uid).get().then((doc)=>{

let data = doc.data()

/* UNLOCK COURSES */

if(data.course1){

document.getElementById("course1").innerHTML =
"<a href='course1.html'>Physical Design Layout</a>"

}

if(data.course2){

document.getElementById("course2").innerHTML =
"<a href='course2.html'>VLSI Lecture Series</a>"

}

if(data.course3){

document.getElementById("course3").innerHTML =
"<a href='course3.html'>Cadence Analog Basics</a>"

}

if(data.course4){

document.getElementById("course4").innerHTML =
"<a href='course4.html'>Signal and Systems</a>"

}

if(data.course5){

document.getElementById("course5").innerHTML =
"<a href='course5.html'>Network Theory</a>"

}

if(data.mentorship){

document.getElementById("mentorship").innerHTML =
"<a href='mentorship.html'>Join Mentorship Session</a>"

}

})

}

})


function logout(){

firebase.auth().signOut().then(function(){

window.location="login.html"

})

}

</script>

</body>
</html>
