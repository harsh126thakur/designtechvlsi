<!DOCTYPE html>
<html>

<head>

<title>Student Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="firebase-config.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:Poppins;
text-align:center;
padding-top:100px;
}

button{
padding:10px 20px;
background:#6366f1;
border:none;
color:white;
border-radius:5px;
}

</style>

</head>

<body>

<h1>Welcome to DesignTech VLSI</h1>

<div id="courses" style="display:none">

<h2>Your Courses</h2>

<a href="course1.html">VLSI Physical Design Course</a>

</div>

<div id="buyCourse" style="display:none">

<h2>No Course Access</h2>

<p>Please purchase course or apply valid coupon.</p>

</div>

<script>

firebase.auth().onAuthStateChanged(async (user)=>{

if(user){

let uid = user.uid;

let doc = await db.collection("students").doc(uid).get();

let data = doc.data();

if(data.courseAccess){

document.getElementById("courses").style.display="block";

}else{

document.getElementById("buyCourse").style.display="block";

}

}

});

</script>

</body>
</html>
