<!DOCTYPE html>
<html>

<meta charset="UTF-8">

<style>

body{
margin:0;
font-family:Poppins;
background:#020617;
color:white;
overflow-x:hidden;
}

/* STAR BACKGROUND */

#starfield{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-4;
}

/* GRID BACKGROUND */

.circuit{
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(#38bdf822 1px, transparent 1px),
linear-gradient(90deg,#38bdf822 1px, transparent 1px);
background-size:80px 80px;
z-index:-3;
animation:gridmove 20s linear infinite;
}

@keyframes gridmove{
0%{transform:translateY(0)}
100%{transform:translateY(80px)}
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
padding:20px 60px;
background:rgba(0,0,0,0.6);
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

nav a:hover{
color:#38bdf8;
}

/* HERO */

.hero{
text-align:center;
padding:120px 20px;
}

.hero h1{
font-size:60px;
background:linear-gradient(90deg,#38bdf8,#6366f1);
-webkit-background-clip:text;
color:transparent;
}

/* ROTATING CHIP */

.chip3d{
margin:auto;
margin-top:40px;
width:120px;
height:120px;
background:linear-gradient(135deg,#38bdf8,#6366f1);
animation:spin 10s linear infinite;
clip-path:polygon(20% 0,80% 0,100% 20%,100% 80%,80% 100%,20% 100%,0 80%,0 20%);
box-shadow:0 0 30px #38bdf8;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* INFO CARDS */

.info-icons{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
padding:60px;
}

.info-card{
background:#1e293b;
padding:30px;
border-radius:12px;
text-align:center;
text-decoration:none;
color:white;
transition:0.3s;
}

.info-card:hover{
transform:translateY(-10px);
background:#334155;
}

/* COURSE GRID */

.courses{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
padding:60px;
}

.card{
background:#1e293b;
padding:30px;
border-radius:14px;
position:relative;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px #38bdf8;
}

.discount{
position:absolute;
top:10px;
right:10px;
background:red;
padding:5px 10px;
border-radius:5px;
font-size:12px;
}

.price-old{
text-decoration:line-through;
color:#aaa;
}

.price-new{
color:#22c55e;
margin-left:10px;
font-weight:bold;
}

button{
padding:12px 22px;
background:#38bdf8;
border:none;
border-radius:6px;
font-size:14px;
cursor:pointer;
}

button:hover{
background:#22c1f0;
}

/* FOUNDER */

.founder{
display:flex;
flex-wrap:wrap;
gap:50px;
padding:80px;
align-items:center;
}

.founder img{
width:240px;
border-radius:50%;
border:4px solid #38bdf8;
}

/* TESTIMONIALS */

.testimonials{
padding:80px 40px;
text-align:center;
}

.testimonial-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.testimonial-card{
background:#1e293b;
padding:30px;
border-radius:12px;
}

/* CONTACT */

.contact{
text-align:center;
padding:80px;
}

.contact a{
color:#38bdf8;
text-decoration:none;
}

/* BIG CONTACT ICONS */

.floating-contact-section{
display:flex;
justify-content:center;
align-items:center;
gap:60px;
padding:60px 20px;
flex-wrap:wrap;
}

.big-contact{
width:120px;
height:120px;
border-radius:50%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-decoration:none;
font-size:40px;
color:white;
transition:0.3s;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.big-contact p{
font-size:13px;
margin-top:8px;
}

.whatsapp-big{
background:#25D366;
}

.call-big{
background:#38bdf8;
}

.channel-big{
background:#16a34a;
}

.big-contact:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 0 25px #38bdf8;
}

/* FOOTER */

footer{
text-align:center;
padding:40px;
background:#0f172a;
}

</style>

<script>

const canvas=document.getElementById("starfield")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<200;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2
})
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

stars.forEach(star=>{
star.y+=0.3
if(star.y>canvas.height) star.y=0

ctx.fillStyle="white"
ctx.fillRect(star.x,star.y,star.size,star.size)

})

requestAnimationFrame(animate)

}

animate()

</script>
