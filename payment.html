<!DOCTYPE html>
<html>

<head>

<title>Course Payment | DesignTech VLSI</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#1e293b;
padding:40px;
border-radius:12px;
text-align:center;
width:350px;
}

button{
padding:14px 22px;
background:#38bdf8;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#22c1f0;
}

</style>

</head>

<body>

<div class="box">

<h2 id="courseTitle">Course</h2>

<h3 id="price">₹0</h3>

<button id="payBtn">Pay Now</button>

</div>


<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {

apiKey: "AIzaSyA9ses0NXK4OI9JcEH3ym8nDS-kvBlBT_8",
authDomain: "designtechvlsi.firebaseapp.com",
projectId: "designtechvlsi",
storageBucket: "designtechvlsi.appspot.com",
messagingSenderId: "268545364402",
appId: "1:268545364402:web:57a3d1d3fb8535998754ab"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let userUID=null;

firebase.auth().onAuthStateChanged(function(user){

if(!user){

alert("Please login first");

window.location="login.html";

}

else{

userUID=user.uid;

}

});



/* GET COURSE FROM URL */

const params = new URLSearchParams(window.location.search);

const course = params.get("course");



/* COURSE PRICE MAP */

const courses = {

course1:{title:"Physical Design Layout",price:1999},
course2:{title:"VLSI Lecture Series",price:1999},
course3:{title:"Cadence Analog Basics",price:1999},
course4:{title:"Signal and Systems",price:299},
course5:{title:"Network Theory",price:299},
mentorship:{title:"1-to-1 Mentorship",price:1999}

};



const selected = courses[course];

document.getElementById("courseTitle").innerText = selected.title;

document.getElementById("price").innerText = "₹"+selected.price;



document.getElementById("payBtn").onclick = function(){

var options = {

key:"rzp_live_SONJ2W1OZ1qVLZ",

amount:selected.price*100,

currency:"INR",

name:"DesignTech VLSI",

description:selected.title,

handler:function(response){

alert("Payment Successful");

let updateData={};

updateData[course]=true;

db.collection("users").doc(userUID).update(updateData);

window.location="dashboard.html";

}

};

var rzp = new Razorpay(options);

rzp.open();

}

</script>

</body>

</html>
