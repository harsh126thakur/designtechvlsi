<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  background:#0f172a;
  font-family:Poppins;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.payment-box{
  background:#020617;
  padding:40px;
  border-radius:12px;
  width:350px;
  text-align:center;
  border:1px solid #1e293b;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  color:black;
  font-weight:600;
  cursor:pointer;
}

#amount{
  font-size:20px;
  color:#22c55e;
}
</style>

</head>

<body>

<div class="payment-box">

<h2>💳 Complete Payment</h2>

<p id="title"></p>
<p id="amount"></p>

<!-- 🔥 NEW FIELDS -->
<input id="name" placeholder="Enter Your Name">
<input id="phone" placeholder="Enter Phone Number">

<input id="coupon" placeholder="Enter Coupon Code">
<button id="couponBtn">Apply Coupon</button>

<button id="payBtn">Pay Now</button>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script type="module">

import { payNow, applyCoupon } from "./js/payment.js";

// coupon
document.getElementById("couponBtn").addEventListener("click", applyCoupon);

// payment
document.getElementById("payBtn").addEventListener("click", async () => {

const btn = document.getElementById("payBtn");
btn.innerText = "Processing...";
btn.disabled = true;

try{
  await payNow();
}catch(e){
  console.error(e);
  btn.innerText = "Pay Now";
  btn.disabled = false;
}

});

</script>

</body>
</html>
