<!DOCTYPE html>
<html>

<head>

<title>Student Dashboard | DesignTech VLSI</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:Poppins;
text-align:center;
padding:60px;
}

h1{
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
max-width:1000px;
margin:auto;
}

.card{
background:#1e293b;
padding:30px;
border-radius:12px;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px #38bdf8;
}

button{
padding:10px 20px;
background:#38bdf8;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#22c1f0;
}

.logout{
position:absolute;
top:20px;
right:20px;
background:#ef4444;
}

</style>

</head>

<body>

<button class="logout" onclick="logout()">Logout</button>

<h1>Welcome to DesignTech VLSI</h1>

<div class="grid">

<div class="card">
<h3>Physical Design Layout</h3>
<div id="course1"></div>
</div>

<div class="card">
<h3>VLSI Lecture Series</h3>
<div id="course2"></div>
</div>

<div class="card">
<h3>Cadence Analog Basics</h3>
<div id="course3"></div>
</div>

<div class="card">
<h3>Signal and Systems</h3>
<div id="course4"></div>
</div>

<div class="card">
<h3>Network Theory</h3>
<div id="course5"></div>
</div>

<div class="card">
<h3>1-to-1 VLSI Mentorship</h3>
<div id="mentorship"></div>
</div>

</div>

<script>

firebase.auth().onAuthStateChanged(async function(user){

if(!user){

window.location="login.html"
return

}

let uid=user.uid

let doc=await db.collection("users").doc(uid).get()

let data=doc.data()

showCourse("course1",data.course1,"course1.html")
showCourse("course2",data.course2,"course2.html")
showCourse("course3",data.course3,"course3.html")
showCourse("course4",data.course4,"course4.html")
showCourse("course5",data.course5,"course5.html")
showCourse("mentorship",data.mentorship,"mentorship.html")

})

function showCourse(id,access,link){

if(access){

document.getElementById(id).innerHTML =
`<a href="${link}"><button>Open Course</button></a>`

}else{

document.getElementById(id).innerHTML =
`<a href="${link}"><button>View Details</button></a>`

}

}

function logout(){

firebase.auth().signOut()

window.location="login.html"

}

</script>

</body>

</html>
