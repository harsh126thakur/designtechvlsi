<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  background:#0f172a;
  font-family:Poppins;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.payment-box{
  background:#020617;
  padding:40px;
  border-radius:12px;
  width:350px;
  text-align:center;
  border:1px solid #1e293b;
}

h2{ margin-bottom:20px; }

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  color:black;
  font-weight:600;
  cursor:pointer;
}

#amount{
  font-size:20px;
  color:#22c55e;
}
</style>

</head>

<body>

<div class="payment-box">

<h2>💳 Complete Payment</h2>

<p id="title"></p>
<p id="amount"></p>

<input id="coupon" placeholder="Enter Coupon Code">
<button onclick="applyCoupon()">Apply Coupon</button>

<button onclick="payNow()">Pay Now</button>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script type="module" src="js/payment.js"></script>

</body>
</html>
