<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cadence Analog Basics | DesignTech VLSI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#020617;
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
background:#0f172a;
}

nav h2{
margin:0;
color:#38bdf8;
}

nav a{
color:white;
text-decoration:none;
}

.container{
display:flex;
height:calc(100vh - 70px);
}

/* VIDEO AREA */

.video-area{
flex:3;
padding:30px;
}

.video-area iframe{
width:100%;
height:500px;
border:none;
border-radius:10px;
}

.title{
margin-top:15px;
font-size:22px;
color:#38bdf8;
}

/* PLAYLIST */

.playlist{
flex:1;
background:#0f172a;
overflow-y:auto;
border-left:1px solid #1e293b;
}

.playlist h3{
padding:20px;
margin:0;
border-bottom:1px solid #1e293b;
}

.lesson{
padding:15px 20px;
cursor:pointer;
border-bottom:1px solid #1e293b;
}

.lesson:hover{
background:#1e293b;
}

.lesson.active{
background:#1e293b;
color:#38bdf8;
}

</style>

</head>

<body>

<nav>

<h2>DesignTech VLSI</h2>

<a href="dashboard.html">⬅ Dashboard</a>

</nav>

<div class="container">

<div class="video-area">

<iframe id="player"
src="https://www.youtube.com/embed/videoseries?list=PLIpZuMTXXr7G8HBzpZYEnNhGrdqprqhwi&index=0"
allowfullscreen>
</iframe>

<div class="title">Cadence Analog Basics</div>

</div>

<div class="playlist">

<h3>Course Lessons</h3>

<div class="lesson active" onclick="play(0,this)">1. Lecture 1</div>
<div class="lesson" onclick="play(1,this)">2. Lecture 2</div>
<div class="lesson" onclick="play(2,this)">3. Lecture 3</div>
<div class="lesson" onclick="play(3,this)">4. Lecture 4</div>
<div class="lesson" onclick="play(4,this)">5. Lecture 5</div>
<div class="lesson" onclick="play(5,this)">6. Lecture 6</div>
<div class="lesson" onclick="play(6,this)">7. Lecture 7</div>
<div class="lesson" onclick="play(7,this)">8. Lecture 8</div>
<div class="lesson" onclick="play(8,this)">9. Lecture 9</div>

</div>

</div>

<script>

function play(index,element){

document.getElementById("player").src =
"https://www.youtube.com/embed/videoseries?list=PLIpZuMTXXr7G8HBzpZYEnNhGrdqprqhwi&index="+index

let lessons=document.querySelectorAll(".lesson")

lessons.forEach(l=>l.classList.remove("active"))

element.classList.add("active")

}

</script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAuth,onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore,doc,getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyA9ses0NXK4OI9JcEH3ym8nDS-kvBlBT_8",
authDomain: "designtechvlsi.firebaseapp.com",
projectId: "designtechvlsi",
storageBucket: "designtechvlsi.firebasestorage.app",
messagingSenderId: "268545364402",
appId: "1:268545364402:web:57a3d1d3fb8535998754ab"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

/* SECURITY CHECK */

onAuthStateChanged(auth, async (user)=>{

if(!user){

window.location.href="login.html";

return;

}

const ref = doc(db,"users",user.uid,"courses","course3");

const snap = await getDoc(ref);

if(!snap.exists()){

alert("You must purchase this course first");

window.location.href="dashboard.html";

}

});

</script></body>
</html>
