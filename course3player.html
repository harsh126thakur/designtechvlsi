<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{

background:#020617;

}

nav{
display:flex;

align-items:center;
padding:18px 40px;
background:#0f172a;
}

nav h2{

color:#38bdf8;
}

nav a{
color:white;
text-decoration:none;
}

.course-container{
display:flex;
height:calc(100vh - 70px);
}

/* VIDEO */

.video-area{
flex:3;
padding:30px;
}

.video-area iframe{

height:500px;

}

.video-title{
font-size:24px;
margin-top:15px;

}

/* PLAYLIST */

.playlist{

background:#0f172a;

border-left:1px solid #1e293b;
}

.playlist h3{
padding:20px;
margin:0;

}

.video-item{
padding:15px 20px;
cursor:pointer;
border-bottom:1px solid #1e293b;
}

.video-item:hover{
background:#1e293b;
}

.video-item.active{
background:#1e293b;
color:#38bdf8;
}

</style>

</head>

<body>

<nav>

<h2>DesignTech VLSI</h2>

<a href="dashboard.html">⬅ Dashboard</a>

</nav>

<div class="course-container">

<div class="video-area">

<iframe id="videoPlayer"

<div id="videoTitle" class="video-title">
Lesson 1
</div>

</div>

<div class="playlist">

<h3>Cadence Analog Basics</h3>

<div class="video-item active" onclick="playVideo('9Wq2R0C4yLE','NMOS Simulation using Cadence')">

<div class="video-item" onclick="playVideo('KXAkxS9M9RU','NMOS Input Output Curve')">

<script>

function playVideo(id,title){

document.getElementById("videoPlayer").src =
"https://www.youtube.com/embed/"+id

document.getElementById("videoTitle").innerText = title

var items = document.querySelectorAll(".video-item")

items.forEach(function(i){
i.classList.remove("active")
})

event.currentTarget.classList.add("active")

}

</script>
