<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cadence Analog Basics | DesignTech VLSI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#020617;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
background:#0f172a;
}

nav h2{
margin:0;
color:#38bdf8;
}

nav a{
color:white;
text-decoration:none;
}

/* MAIN LAYOUT */

.course-container{
display:flex;
height:calc(100vh - 70px);
}

/* VIDEO AREA */

.video-area{
flex:3;
padding:30px;
}

.video-area iframe{
width:100%;
height:500px;
border:none;
border-radius:10px;
}

.video-title{
font-size:24px;
margin-top:15px;
color:#38bdf8;
}

/* PLAYLIST */

.playlist{
flex:1;
background:#0f172a;
overflow-y:auto;
border-left:1px solid #1e293b;
}

.playlist h3{
padding:20px;
margin:0;
border-bottom:1px solid #1e293b;
}

.video-item{
padding:15px 20px;
cursor:pointer;
border-bottom:1px solid #1e293b;
}

.video-item:hover{
background:#1e293b;
}

.video-item.active{
background:#1e293b;
color:#38bdf8;
}

/* MOBILE */

@media(max-width:900px){

.course-container{
flex-direction:column;
}

.video-area iframe{
height:300px;
}

.playlist{
height:300px;
}

}

</style>

</head>

<body>

<nav>

<h2>DesignTech VLSI</h2>

<a href="dashboard.html">⬅ Dashboard</a>

</nav>

<div class="course-container">

<!-- VIDEO PLAYER -->

<div class="video-area">

<iframe id="videoPlayer"
src="https://www.youtube.com/embed/VIDEO_ID"
allowfullscreen>
</iframe>

<div id="videoTitle" class="video-title">
Lesson 1
</div>

</div>

<!-- PLAYLIST -->

<div class="playlist">

<h3>Course Lessons</h3>

<div class="video-item active" onclick="playVideo('VIDEO_ID','Introduction')">
1. Introduction
</div>

<div class="video-item" onclick="playVideo('VIDEO_ID2','Cadence Setup')">
2. Cadence Setup
</div>

<div class="video-item" onclick="playVideo('VIDEO_ID3','Schematic Design')">
3. Schematic Design
</div>

<div class="video-item" onclick="playVideo('VIDEO_ID4','Simulation')">
4. Analog Simulation
</div>

<div class="video-item" onclick="playVideo('VIDEO_ID5','Layout Basics')">
5. Layout Basics
</div>

</div>

</div>

<script>

function playVideo(id,title){

document.getElementById("videoPlayer").src=
"https://www.youtube.com/embed/"+id

document.getElementById("videoTitle").innerText=title

let items=document.querySelectorAll(".video-item")

items.forEach(i=>i.classList.remove("active"))

event.target.classList.add("active")

}

</script>

</body>
</html>
