<!DOCTYPE html>
<html>

<head>

<title>Register | DesignTech VLSI</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#0f172a;
padding:40px;
border-radius:10px;
width:350px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:15px;
background:#38bdf8;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Register</h2>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<input id="coupon" type="text" placeholder="Coupon Code (Optional)">

<button onclick="register()">Register</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>

<script>

async function register(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value
let coupon=document.getElementById("coupon").value

try{

let userCredential=await firebase.auth().createUserWithEmailAndPassword(email,password)

let uid=userCredential.user.uid

await db.collection("users").doc(uid).set({

email:email,
course1:false,
course2:false,
course3:false,
course4:false,
course5:false,
mentorship:false

})

if(coupon!=""){

let couponDoc=await db.collection("coupons").doc(coupon).get()

if(couponDoc.exists){

let data=couponDoc.data()

let today=new Date()
let expiry=new Date(data.expiry)

if(!data.active){

alert("Coupon Disabled")

}

else if(today>expiry){

alert("Coupon Expired")

}

else if(data.usedCount>=data.maxUses){

alert("Coupon Limit Reached")

}

else{

await db.collection("coupons").doc(coupon).update({

usedCount:firebase.firestore.FieldValue.increment(1)

})

await db.collection("users").doc(uid).update({

course1:true,
course2:true,
course3:true,
course4:true,
course5:true,
mentorship:true

})

alert("Coupon Applied! All Courses Unlocked")

}

}

else{

alert("Invalid Coupon Code")

}

}

alert("Registration Successful")

window.location="dashboard.html"

}

catch(error){

alert(error.message)

}

}

</script>

</body>

</html>
