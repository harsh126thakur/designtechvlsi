<!DOCTYPE html>
<html>

<head>

<title>Register | DesignTech VLSI</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1e293b;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
padding:12px;
width:100%;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#22c1f0;
}

</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>

<p style="margin-top:15px">
Already registered? <a href="login.html" style="color:#38bdf8">Login</a>
</p>

</div>


<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>


<script>

const firebaseConfig = {
apiKey: "AIzaSyA9ses0NXK4OI9JcEH3ym8nDS-kvBlBT_8",
authDomain: "designtechvlsi.firebaseapp.com",
projectId: "designtechvlsi",
storageBucket: "designtechvlsi.appspot.com",
messagingSenderId: "268545364402",
appId: "1:268545364402:web:57a3d1d3fb8535998754ab"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();


function register(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

if(email=="" || password==""){

alert("Please enter email and password")
return

}

firebase.auth().createUserWithEmailAndPassword(email,password)

.then(function(userCredential){

let uid=userCredential.user.uid

db.collection("users").doc(uid).set({

email:email,
course1:false,
course2:false,
course3:false,
course4:false,
course5:false

})

alert("Registration successful")

window.location="login.html"

})

.catch(function(error){

alert(error.message)

})

}

</script>

</body>
</html>
