<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sign Up | DesignTech VLSI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.signup-box{
background:#1e293b;
padding:40px;
border-radius:12px;
width:350px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#38bdf8;
border:none;
border-radius:6px;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#22c1f0;
}

.google{
background:#ea4335;
}

#recaptcha-container{
margin-top:15px;
}

a{
color:#38bdf8;
text-decoration:none;
}

</style>

</head>

<body>

<div class="signup-box">

<h2>Create Account</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button id="signupBtn">Sign Up</button>

<hr style="margin:25px 0; border:1px solid #334155;">

<h3>Phone OTP Verification</h3>

<input type="tel" id="phone" placeholder="+91XXXXXXXXXX">

<div id="recaptcha-container"></div>

<button id="sendOtp">Send OTP</button>

<input type="text" id="otp" placeholder="Enter OTP">

<button id="verifyOtp">Verify OTP</button>

<hr style="margin:25px 0; border:1px solid #334155;">

<button id="googleLogin" class="google">Sign Up with Google</button>

<p style="margin-top:20px;">
Already have an account? <a href="login.html">Login</a>
</p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithPopup,
GoogleAuthProvider,
RecaptchaVerifier,
signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyA9ses0NXK4OI9JcEH3ym8nDS-kvBlBT_8",
authDomain: "designtechvlsi.firebaseapp.com",
projectId: "designtechvlsi",
storageBucket: "designtechvlsi.firebasestorage.app",
messagingSenderId: "268545364402",
appId: "1:268545364402:web:57a3d1d3fb8535998754ab",
measurementId: "G-F5KGZK2JDK"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* EMAIL SIGNUP */

document.getElementById("signupBtn").addEventListener("click",()=>{

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)

.then(()=>{
alert("Account created successfully");
window.location.href="dashboard.html";
})

.catch((error)=>{
alert(error.message);
})

});

/* GOOGLE SIGNUP */

const provider=new GoogleAuthProvider();

document.getElementById("googleLogin").addEventListener("click",()=>{

signInWithPopup(auth,provider)

.then(()=>{
window.location.href="dashboard.html";
})

.catch((error)=>{
alert(error.message);
})

});

/* PHONE OTP */

window.recaptchaVerifier = new RecaptchaVerifier(auth,'recaptcha-container',{
'size':'normal',
'callback':()=>{}
});

const appVerifier=window.recaptchaVerifier;

document.getElementById("sendOtp").addEventListener("click",()=>{

const phoneNumber=document.getElementById("phone").value;

signInWithPhoneNumber(auth,phoneNumber,appVerifier)

.then((confirmationResult)=>{

window.confirmationResult=confirmationResult;

alert("OTP Sent");

})

.catch((error)=>{
alert(error.message);
})

});

document.getElementById("verifyOtp").addEventListener("click",()=>{

const code=document.getElementById("otp").value;

confirmationResult.confirm(code)

.then(()=>{
alert("Phone verified");
window.location.href="dashboard.html";
})

.catch(()=>{
alert("Invalid OTP");
})

});

</script>

</body>
</html>
