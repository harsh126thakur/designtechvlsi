<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sign Up | DesignTech VLSI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.signup-box{
background:#1e293b;
padding:40px;
border-radius:12px;
width:360px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#38bdf8;
border:none;
border-radius:6px;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#22c1f0;
}

.google{
background:#ea4335;
}

a{
color:#38bdf8;
text-decoration:none;
}

</style>

</head>

<body>

<div class="signup-box">

<h2>Create Account</h2>

<input type="text" id="name" placeholder="Full Name">

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button id="signupBtn">Sign Up</button>

<hr style="margin:25px 0; border:1px solid #334155;">

<button id="googleLogin" class="google">Continue with Google</button>

<p style="margin-top:20px;">
Already have an account? <a href="login.html">Login</a>
</p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
updateProfile,
signInWithPopup,
GoogleAuthProvider
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyA9ses0NXK4OI9JcEH3ym8nDS-kvBlBT_8",
authDomain: "designtechvlsi.firebaseapp.com",
projectId: "designtechvlsi",
storageBucket: "designtechvlsi.firebasestorage.app",
messagingSenderId: "268545364402",
appId: "1:268545364402:web:57a3d1d3fb8535998754ab",
measurementId: "G-F5KGZK2JDK"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* EMAIL SIGNUP */

document.getElementById("signupBtn").addEventListener("click",()=>{

const name=document.getElementById("name").value;
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)

.then((userCredential)=>{

const user=userCredential.user;

updateProfile(user,{
displayName:name
});

window.location.href="dashboard.html";

})

.catch((error)=>{

alert(error.message);

})

});

/* GOOGLE LOGIN */

const provider=new GoogleAuthProvider();

document.getElementById("googleLogin").addEventListener("click",()=>{

signInWithPopup(auth,provider)

.then(()=>{

window.location.href="dashboard.html";

})

.catch((error)=>{

alert(error.message);

})

});

</script>

</body>
</html>
