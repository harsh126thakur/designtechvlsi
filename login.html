<script type="module">
  import { auth, db } from "./js/firebase.js";
  import {
    signInWithEmailAndPassword,
    signOut
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    collection,
    query,
    where,
    getDocs,
    doc,
    getDoc,
    serverTimestamp,
    setDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  async function login() {
    const email = document.getElementById("email")?.value?.trim().toLowerCase();
    const password = document.getElementById("password")?.value?.trim();
    const errorBox = document.getElementById("error");
    const loginBtn = document.getElementById("loginBtn");

    errorBox.innerText = "";

    if (!email || !password) {
      errorBox.innerText = "Please fill all fields";
      return;
    }

    try {
      loginBtn.innerText = "Logging in...";
      loginBtn.disabled = true;

      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      const adminQuery = query(collection(db, "admins"), where("email", "==", email));
      const adminSnap = await getDocs(adminQuery);

      if (!adminSnap.empty) {
        const adminData = adminSnap.docs[0].data();
        const role = String(adminData.role || "").toLowerCase();

        if (adminData.isActive === false) {
          await signOut(auth);
          errorBox.innerText = "Admin account is inactive";
          loginBtn.innerText = "Login";
          loginBtn.disabled = false;
          return;
        }

        if (role === "superadmin") {
          window.location.href = "superadmin.html";
          return;
        }

        if (role === "admin") {
          window.location.href = "admin.html";
          return;
        }
      }

      const userRef = doc(db, "users", user.uid);
      const userSnap = await getDoc(userRef);

      if (!userSnap.exists()) {
        await setDoc(userRef, {
          name: user.displayName || "",
          email: user.email || email,
          role: "student",
          isActive: true,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
          lastLoginAt: serverTimestamp()
        }, { merge: true });

        window.location.href = "dashboard.html";
        return;
      }

      const userData = userSnap.data();

      if (userData.isActive === false) {
        await signOut(auth);
        errorBox.innerText = "Your account is inactive";
        loginBtn.innerText = "Login";
        loginBtn.disabled = false;
        return;
      }

      await setDoc(userRef, {
        lastLoginAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      }, { merge: true });

      const role = String(userData.role || "student").toLowerCase();

      if (role === "superadmin") {
        window.location.href = "superadmin.html";
      } else if (role === "admin") {
        window.location.href = "admin.html";
      } else {
        window.location.href = "dashboard.html";
      }

    } catch (err) {
      console.error("LOGIN ERROR:", err);

      if (err.code === "auth/invalid-credential") {
        errorBox.innerText = "Invalid email or password";
      } else if (err.code === "auth/user-not-found") {
        errorBox.innerText = "User not found";
      } else if (err.code === "auth/wrong-password") {
        errorBox.innerText = "Incorrect password";
      } else {
        errorBox.innerText = err.message;
      }

      loginBtn.innerText = "Login";
      loginBtn.disabled = false;
    }
  }

  document.getElementById("loginBtn").addEventListener("click", login);

  document.getElementById("password").addEventListener("keypress", function (e) {
    if (e.key === "Enter") login();
  });

  document.getElementById("email").addEventListener("keypress", function (e) {
    if (e.key === "Enter") login();
  });
</script>
