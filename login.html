<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | DesignTech VLSI</title>

  <link rel="stylesheet" href="css/login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body>

  <nav class="nav">
    <h2>DesignTech VLSI</h2>
    <div>
      <a href="index.html">Home</a>
      <a href="signup.html">Sign Up</a>
    </div>
  </nav>

  <div class="center">
    <div class="box">
      <h2>Login to Your Account</h2>
      <p class="small-text" style="margin-top:-8px; margin-bottom:14px;">
        Access your courses, dashboard, and admin panel based on your role
      </p>

      <input
        type="email"
        id="email"
        placeholder="Enter your email"
        autocomplete="username"
      />

      <input
        type="password"
        id="password"
        placeholder="Enter your password"
        autocomplete="current-password"
      />

      <button id="loginBtn">Login</button>

      <p id="error"></p>

      <p class="small-text">
        Don't have an account? <a href="signup.html">Sign up</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./js/firebase.js";
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      collection,
      query,
      where,
      getDocs,
      doc,
      getDoc,
      serverTimestamp,
      setDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    async function login() {
      const email = document.getElementById("email")?.value?.trim().toLowerCase();
      const password = document.getElementById("password")?.value?.trim();
      const errorBox = document.getElementById("error");
      const loginBtn = document.getElementById("loginBtn");

      errorBox.innerText = "";

      if (!email || !password) {
        errorBox.innerText = "Please fill all fields";
        return;
      }

      try {
        loginBtn.innerText = "Logging in...";
        loginBtn.disabled = true;

        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // =============================
        // 1. CHECK ADMINS COLLECTION BY EMAIL
        // =============================
        const adminQuery = query(
          collection(db, "admins"),
          where("email", "==", email)
        );

        const adminSnap = await getDocs(adminQuery);

        if (!adminSnap.empty) {
          const adminDoc = adminSnap.docs[0];
          const adminData = adminDoc.data();

          if (adminData.isActive === false) {
            errorBox.innerText = "Admin account is inactive";
            loginBtn.innerText = "Login";
            loginBtn.disabled = false;
            return;
          }

          if ((adminData.role || "").toLowerCase() === "superadmin") {
            window.location.href = "superadmin.html";
            return;
          }

          if ((adminData.role || "").toLowerCase() === "admin") {
            window.location.href = "admin.html";
            return;
          }
        }

        // =============================
        // 2. CHECK USERS COLLECTION BY UID
        // =============================
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        if (!userSnap.exists()) {
          await setDoc(userRef, {
            name: user.displayName || "",
            email: user.email || email,
            role: "student",
            isActive: true,
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp(),
            lastLoginAt: serverTimestamp()
          }, { merge: true });

          window.location.href = "dashboard.html";
          return;
        }

        const userData = userSnap.data();

        await setDoc(userRef, {
          lastLoginAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        }, { merge: true });

        if (userData.isActive === false) {
          errorBox.innerText = "Your account is inactive";
          loginBtn.innerText = "Login";
          loginBtn.disabled = false;
          return;
        }

        const role = (userData.role || "student").toLowerCase();

        if (role === "superadmin") {
          window.location.href = "superadmin.html";
        } else if (role === "admin") {
          window.location.href = "admin.html";
        } else {
          window.location.href = "dashboard.html";
        }

      } catch (err) {
        console.error("LOGIN ERROR:", err);

        if (err.code === "auth/invalid-credential") {
          errorBox.innerText = "Invalid email or password";
        } else if (err.code === "auth/user-not-found") {
          errorBox.innerText = "User not found";
        } else if (err.code === "auth/wrong-password") {
          errorBox.innerText = "Incorrect password";
        } else {
          errorBox.innerText = err.message;
        }

        loginBtn.innerText = "Login";
        loginBtn.disabled = false;
      }
    }

    document.getElementById("loginBtn").addEventListener("click", login);

    document.getElementById("password").addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        login();
      }
    });

    document.getElementById("email").addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        login();
      }
    });
  </script>

</body>
</html>
