<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | DesignTech VLSI</title>
  <link rel="stylesheet" href="css/login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <nav class="nav">
    <h2>DesignTech VLSI</h2>
    <div>
      <a href="index.html">Home</a>
      <a href="signup.html">Sign Up</a>
    </div>
  </nav>

  <div class="center">
    <div class="box">
      <h2>Login to Your Account</h2>
      <p class="small-text" style="margin-top:-8px; margin-bottom:14px;">
        Access your courses, dashboard, and admin panel based on your role
      </p>

      <input type="email" id="email" placeholder="Enter your email" autocomplete="username" />
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
      <button id="loginBtn" type="button">Login</button>
      <p id="error"></p>

      <p class="small-text">
        Don't have an account? <a href="signup.html">Sign up</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./js/firebase.js";
    import {
      signInWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      doc,
      getDoc,
      serverTimestamp,
      setDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const errorBox = document.getElementById("error");

    async function login() {
      const email = emailEl.value.trim().toLowerCase();
      const password = passwordEl.value.trim();

      errorBox.innerText = "";

      if (!email || !password) {
        errorBox.innerText = "Please fill all fields";
        return;
      }

      try {
        loginBtn.disabled = true;
        loginBtn.innerText = "Logging in...";

        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        console.log("AUTH SUCCESS:", user.uid, user.email);

        // ================= SECURE USER FETCH =================
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        // ================= NEW USER =================
        if (!userSnap.exists()) {
          await setDoc(userRef, {
            name: user.displayName || "",
            email: user.email || email,
            role: "student",
            isActive: true,
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp(),
            lastLoginAt: serverTimestamp()
          }, { merge: true });

          window.location.href = "dashboard.html";
          return;
        }

        const userData = userSnap.data();
        console.log("USER DATA:", userData);

        // ================= INACTIVE USER =================
        if (userData.isActive === false) {
          await signOut(auth);
          errorBox.innerText = "Your account is inactive";
          loginBtn.disabled = false;
          loginBtn.innerText = "Login";
          return;
        }

        // ================= UPDATE LOGIN TIME =================
        await setDoc(userRef, {
          lastLoginAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        }, { merge: true });

        // ================= 🔐 SECURE ROLE CHECK =================
        const role = String(userData.role || "student").toLowerCase();

        if (role === "superadmin") {
          window.location.href = "superadmin.html";
        } else if (role === "admin") {
          window.location.href = "admin.html";
        } else {
          window.location.href = "dashboard.html";
        }

      } catch (err) {
        console.error("LOGIN ERROR:", err);

        if (err.code === "auth/invalid-credential") {
          errorBox.innerText = "Invalid email or password";
        } else if (err.code === "auth/user-not-found") {
          errorBox.innerText = "User not found";
        } else if (err.code === "auth/wrong-password") {
          errorBox.innerText = "Incorrect password";
        } else if (err.code === "auth/network-request-failed") {
          errorBox.innerText = "Network error. Please check your internet.";
        } else if (err.code === "permission-denied") {
          errorBox.innerText = "Firestore permission denied";
        } else {
          errorBox.innerText = err.message;
        }

        loginBtn.disabled = false;
        loginBtn.innerText = "Login";
      }
    }

    loginBtn.addEventListener("click", login);

    passwordEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });

    emailEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
