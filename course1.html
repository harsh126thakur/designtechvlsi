<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Physical Design Layout | DesignTech VLSI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#020617;
color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:60px 20px;
}

.hero{
text-align:center;
margin-bottom:40px;
}

.hero h1{
font-size:42px;
background:linear-gradient(90deg,#38bdf8,#6366f1);
-webkit-background-clip:text;
color:transparent;
}

iframe{
width:100%;
height:450px;
border-radius:10px;
margin-bottom:30px;
}

.lecture{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
cursor:pointer;
}

.lock{
color:#f87171;
}

.enroll{
background:#111827;
padding:40px;
border-radius:12px;
text-align:center;
margin-top:50px;
}

button{
padding:14px 28px;
border:none;
background:#38bdf8;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#22c1f0;
}

</style>

</head>

<body>

<div class="container">

<div class="hero">

<h1>Physical Design Layout</h1>

<p>Complete Physical Design Flow (Floorplan → GDSII)</p>

</div>


<iframe id="player"
src="https://www.youtube.com/embed/videoseries?list=PLIpZuMTXXr7EKxwWAct3Js68EgI31HFzf"
allowfullscreen></iframe>


<h2>Course Lectures</h2>

<div id="lectureList"></div>


<div class="enroll" id="paymentBox">

<h2>Unlock Full Course</h2>

<p style="font-size:28px;color:#22c55e;">₹1999</p>

<button id="payBtn">Pay ₹1999</button>

</div>

</div>


<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>


<script>

let currentUser=null
let unlocked=false

firebase.auth().onAuthStateChanged(async function(user){

if(!user){

alert("Please login first")

window.location="login.html"

}

else{

currentUser=user

let doc=await db.collection("users").doc(user.uid).get()

let data=doc.data()

if(data.course1){

unlocked=true

document.getElementById("paymentBox").style.display="none"

unlockLectures()

}

}

})



function playVideo(video,free){

if(free || unlocked){

document.getElementById("player").src="https://www.youtube.com/embed/"+video

}

else{

alert("Please purchase the course to unlock")

}

}


function unlockLectures(){

document.querySelectorAll(".locked").forEach(el=>{
el.innerHTML="Unlocked"
el.classList.remove("lock")
})

}



/* Example lecture list */

const lectures=[

{title:"Introduction",video:"CHaOflmuIQg",free:true},

{title:"Floorplanning",video:"CHaOflmuIQg",free:false},

{title:"Placement",video:"CHaOflmuIQg",free:false},

{title:"Clock Tree Synthesis",video:"CHaOflmuIQg",free:false},

{title:"Routing",video:"CHaOflmuIQg",free:false}

]


const list=document.getElementById("lectureList")

lectures.forEach((lec,index)=>{

let div=document.createElement("div")

div.className="lecture"

if(lec.free){

div.innerHTML="<span>Lecture "+(index+1)+" – "+lec.title+"</span><span>Free</span>"

div.onclick=()=>playVideo(lec.video,true)

}

else{

div.innerHTML="<span>Lecture "+(index+1)+" – "+lec.title+"</span><span class='lock locked'>🔒 Locked</span>"

div.onclick=()=>playVideo(lec.video,false)

}

list.appendChild(div)

})



/* PAYMENT */

document.getElementById("payBtn").onclick=function(){

var options={

key:"rzp_live_SONJ2W1OZ1qVLZ",

amount:199900,

currency:"INR",

name:"DesignTech VLSI",

description:"Physical Design Layout Course",

handler:function(response){

alert("Payment Successful!")

db.collection("users").doc(currentUser.uid).update({

course1:true

}).then(()=>{

location.reload()

})

}

}

var rzp=new Razorpay(options)

rzp.open()

}

</script>

</body>
</html>
