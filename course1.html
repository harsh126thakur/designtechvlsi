<!DOCTYPE html>
<html>

<head>

<title>Physical Design Layout | DesignTech VLSI</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#020617;
color:white;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

.video{
margin:30px 0;
}

.course-box{
background:#1e293b;
padding:30px;
border-radius:10px;
margin-top:20px;
}

.lock{
color:#f87171;
}

button{
padding:12px 22px;
background:#38bdf8;
border:none;
border-radius:6px;
font-size:14px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#22c1f0;
}

</style>

</head>

<body>

<div class="container">

<h1>Physical Design Layout</h1>

<p>Learn the complete Physical Design flow from Floorplanning to Routing.</p>

<h3>Free Preview</h3>

<div class="video">

<iframe width="100%" height="420"
src="https://www.youtube.com/embed/CHaOflmuIQg"
frameborder="0"
allowfullscreen>
</iframe>

</div>


<div class="course-box">

<h3>Course Content</h3>

<ul>

<li>Lecture 1 – Introduction (Free)</li>

<li id="l2" class="lock">Lecture 2 – Floorplanning 🔒</li>

<li id="l3" class="lock">Lecture 3 – Placement 🔒</li>

<li id="l4" class="lock">Lecture 4 – Routing 🔒</li>

</ul>

</div>


<div class="course-box" id="buyBox">

<h2>Enroll Now</h2>

<p>Price ₹1999</p>

<button id="payBtn">Pay ₹1999</button>

</div>

</div>


<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>

<script>

const db = firebase.firestore();

let currentUser = null;

firebase.auth().onAuthStateChanged(function(user){

if(!user){

alert("Please login first");

window.location="login.html";

}

else{

currentUser = user;

db.collection("users").doc(user.uid).get().then((doc)=>{

let data = doc.data()

if(data.course1){

unlockCourse()

}

})

}

})


function unlockCourse(){

document.getElementById("l2").classList.remove("lock")
document.getElementById("l3").classList.remove("lock")
document.getElementById("l4").classList.remove("lock")

document.getElementById("l2").innerHTML =
'<a href="https://www.youtube.com/embed/YOURVIDEO2" target="_blank">Lecture 2 – Floorplanning</a>'

document.getElementById("l3").innerHTML =
'<a href="https://www.youtube.com/embed/YOURVIDEO3" target="_blank">Lecture 3 – Placement</a>'

document.getElementById("l4").innerHTML =
'<a href="https://www.youtube.com/embed/YOURVIDEO4" target="_blank">Lecture 4 – Routing</a>'

document.getElementById("buyBox").style.display="none"

}


document.getElementById("payBtn").onclick = function(){

var options = {

key: "rzp_live_SONJ2W1OZ1qVLZ",

amount: 199900,

currency: "INR",

name: "DesignTech VLSI",

description: "Physical Design Layout Course",

handler: function (response) {

alert("Payment Successful")

db.collection("users").doc(currentUser.uid).update({

course1:true

}).then(()=>{

unlockCourse()

})

}

};

var rzp = new Razorpay(options);

rzp.open();

}

</script>

</body>

</html>
