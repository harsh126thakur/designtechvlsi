<!DOCTYPE html>
<html>
<head>
<title>Course Player</title>
<style>

body{
margin:0;
font-family:Poppins;
background:#0f172a;
color:white;
}

.nav{
background:#020617;
padding:15px;
display:flex;
justify-content:space-between;
}

.container{
display:flex;
height:90vh;
}

.player{
flex:3;
padding:20px;
}

.player iframe{
width:100%;
height:80%;
border-radius:10px;
}

.playlist{
flex:1;
background:#020617;
overflow-y:auto;
padding:10px;
}

.lecture{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

.lecture:hover{
background:#1e293b;
}

</style>
</head>

<body>

<div class="nav">
<h2 id="courseTitle"></h2>
<button onclick="goBack()">⬅ Back</button>
</div>

<div class="container">

<div class="player">
<iframe id="videoPlayer"></iframe>
</div>

<div class="playlist" id="playlist"></div>

</div>

<script type="module" src="js/course.js"></script>

</body>
</html>
